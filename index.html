<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    
    /* FOTO DE FONDO */
    background: url("fondo.jpg") no-repeat center center;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: flex-end;
}

/* BOTÓN */
button {
    margin-bottom: 240px;

    padding: 40px 90px;
    font-size: 45px;
    background: #2784F5; /* 👈 COLOR SÓLIDO */
    border: none;
    border-radius: 15px;
    cursor: pointer;
    color: white;
    font-weight: bold;

    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

/* EFECTO HOVER */
button:hover {
    transform: scale(1.1);
    background: #1f6659; /* 👈 UN TONO MÁS OSCURO */
}

/* EFECTO ENTRADA */
button {
    animation: aparecer 1.5s ease;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(80px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body onclick="activarAudio()">

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="entrar()">Entrar</button>

<script>
let audioActivado = false;

function activarAudio() {
    if (!audioActivado) {
        const audio = document.getElementById("musica");
        audio.play().catch(() => {});
        audioActivado = true;
    }
}

function entrar() {
    const audio = document.getElementById("musica");
    audio.play();

    window.open("https://fainvitaciones.com/juliana-mis-xv", "_blank");
}
</script>

</body>
</html>
